  Solid {
    translation IS translation
    rotation IS rotation
    name IS name
    
    children [
      Transform {
        scale IS treeScale
        children [
          CadShape {
            url [ "D:/WeBots_Prodjects/Map_tree/blender_meshes/Tree1.obj" ]
          }
        ]
      }
    ]
    boundingObject Mesh {
      url [ "D:/WeBots_Prodjects/Map_tree/blender_meshes/Tree1.obj" ]
    }
  }
}