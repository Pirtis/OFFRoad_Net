#VRML_SIM R2023b utf8
PROTO Road2 [
  field SFVec3f    translation 0 0 0
  field SFRotation rotation    0 0 1 0
  field SFString   name        "road2"
  field SFVec3f    roadScale   1.5 1.5 1.5
]
{
  Solid {
    translation IS translation
    rotation IS rotation
    name IS name
    
    children [
      Transform {
        scale IS roadScale
        children [
          Shape {
            appearance PBRAppearance {
              baseColorMap ImageTexture {
                url [ "D:/WeBots_Prodjects/Map_tree/blender_meshes/dirtroad.jpg" ]
              }
              textureTransform TextureTransform {
                scale 1.35 1.35
                translation -0.65 0
              }
              roughness 0.9
              metalness 0.0
            }
            geometry Mesh {
              url [ "D:/WeBots_Prodjects/Map_tree/blender_meshes/Road2.obj" ]
            }
          }
        ]
      }
    ]
    
    # Используем Mesh для точной коллизии
    boundingObject Mesh {
      url [ "D:/WeBots_Prodjects/Map_tree/blender_meshes/Road2.obj" ]
    }
  }
}