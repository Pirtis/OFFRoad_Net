#VRML_SIM R2023b utf8
PROTO Stone1 [
  field SFVec3f    translation 0 0 0
  field SFRotation rotation    0 0 1 0
  field SFString   name        "stone"
  field SFVec3f    stoneScale  1 1 1  # Обратите внимание: имя поля stoneScale
]
{
  Solid {
    translation IS translation
    rotation IS rotation
    name IS name
    
    children [
      Transform {
        scale IS stoneScale
        children [
          CadShape {
            url [ "D:/WeBots_Prodjects/Map_tree/blender_meshes/Stone.obj" ]
          }
        ]
      }
    ]
    
    boundingObject Mesh {
      url [ "D:/WeBots_Prodjects/Map_tree/blender_meshes/Stone.obj" ]
    }
  }
}